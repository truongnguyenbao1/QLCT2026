name: quanlynhatro
description: "Ứng dụng Quản lý Nhà trọ - Minh bạch, Tiện lợi, Đúng luật"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  bloc: ^8.1.4

  # ── Dependency Injection ──────────────────────────────────────────────
  get_it: ^7.7.0
  injectable: ^2.4.4

  # ── Navigation ────────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Backend: Supabase ─────────────────────────────────────────────────
  supabase_flutter: ^2.8.1

  # ── Local Storage ─────────────────────────────────────────────────────
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # ── Security ──────────────────────────────────────────────────────────
  encrypt: ^5.0.3
  crypto: ^3.0.3
  pointycastle: ^3.9.1

  # ── Functional Programming ───────────────────────────────────────────
  dartz: ^0.10.1

  # ── PDF Export ───────────────────────────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.13.1

  # ── QR Code ──────────────────────────────────────────────────────────
  qr_flutter: ^4.1.0

  # ── Image Handling ───────────────────────────────────────────────────
  flutter_image_compress: ^2.3.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # ── Charts & Visualization ───────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── Utilities ────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.5.1
  collection: ^1.18.0
  rxdart: ^0.28.0

  # ── UI Components ────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  gap: ^3.0.1
  flutter_animate: ^4.5.0

  # ── Notifications ────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.2

  # ── Permissions ──────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Connectivity ─────────────────────────────────────────────────────
  connectivity_plus: ^6.1.0

  # ── Date & Time ──────────────────────────────────────────────────────
  table_calendar: ^3.1.2

  # ── File & Share ─────────────────────────────────────────────────────
  path_provider: ^2.1.4
  open_file: ^3.5.8
  share_plus: ^10.1.4
  seo: ^0.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  hive_generator: ^2.0.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
