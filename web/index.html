<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ứng dụng Quản lý Cư trú và Phòng Trọ.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Quản lý cư trú">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Quản lý cư trú</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <!-- Xóa token Supabase khỏi localStorage mỗi khi tải trang.
       Phải chạy TRƯỚC khi Flutter/Supabase SDK khởi tạo để đảm bảo
       phiên cũ không bị khôi phục. -->
  <script>
    (function () {
      // Supabase lưu token với key dạng: sb-<project-ref>-auth-token
      // Xóa tất cả các key có prefix 'sb-' và suffix '-auth-token'
      var keysToDelete = [];
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (key && key.startsWith('sb-') && key.endsWith('-auth-token')) {
          keysToDelete.push(key);
        }
      }
      keysToDelete.forEach(function (key) {
        localStorage.removeItem(key);
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
